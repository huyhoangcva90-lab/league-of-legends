<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#f4f7fa">
  <title>LoL Analyst</title>
  <link rel="preconnect" href="https://ddragon.leagueoflegends.com" crossorigin>
  <link rel="stylesheet" href="style.css?v=20260717-teamfight-archetypes">
</head>
<body>
  <a class="skip-link" href="#app-main">Skip navigation</a>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><span>LA</span><div><b>LoL Analyst</b><small>Draft & Strategy</small></div></div>
      <button class="sidebar-collapse" type="button" data-action="toggle-sidebar" aria-label="Collapse navigation" aria-expanded="true">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14.5 7 9.5 12l5 5"/></svg>
      </button>
      <nav id="app-nav" aria-label="Main navigation"></nav>
      <div class="sidebar-status"><span>Composition</span><b id="team-count">0 / 10</b><button type="button" data-action="reset-workspace">Reset workspace</button></div>
    </aside>
    <div class="app-column">
      <header class="topbar">
        <button class="menu-button" type="button" aria-label="Open navigation" aria-expanded="false" data-action="toggle-nav"><span></span><span></span><span></span></button>
        <div><span id="page-group">Workspace</span><h1 id="page-title">Team Analyzer</h1></div>
        <div class="language-switch" aria-label="Language"><button type="button" data-lang="en">EN</button><button type="button" data-lang="vi">VI</button></div>
        <div class="topbar-actions"><button type="button" data-action="swap-sides">Swap sides</button><button type="button" class="primary" data-route="draft">Open Draft</button></div>
      </header>
      <main id="app-main" tabindex="-1"></main>
    </div>
  </div>

  <dialog id="champion-picker">
    <div class="dialog-head"><div><b>Choose champion</b><small id="picker-context"></small></div><button type="button" aria-label="Close champion picker" data-action="close-picker">&times;</button></div>
    <label class="field"><span>Find champion</span><input id="picker-search" name="champion-search" type="search" autocomplete="off" placeholder="Enter champion name…"></label>
    <div id="picker-filters" class="picker-filters" aria-label="Champion filters"></div>
    <div id="picker-summary" class="picker-summary" aria-live="polite"></div>
    <div id="picker-list" class="picker-list"></div>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="data.js?v=20260716-tier1614"></script>
  <script src="matchup-lanes.js"></script>
  <script src="sheet-details.js"></script>
  <script src="jungle-details.js"></script>
  <script src="lol/setting-data.js"></script>
  <script src="team-rules.js"></script>
  <script src="app.js?v=20260717-teamfight-catcher-map"></script>
</body>
</html>
